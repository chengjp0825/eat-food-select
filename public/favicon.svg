<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E85D3D"/>
      <stop offset="100%" stop-color="#C94A2E"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C94A2E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C94A2E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 蒸汽曲线 -->
  <g fill="none" stroke="url(#steamGrad)" stroke-width="2.5" stroke-linecap="round">
    <path d="M16 12 Q18 8 16 4"/>
    <path d="M24 10 Q26 5 24 2"/>
    <path d="M32 12 Q34 8 32 4"/>
  </g>

  <!-- 碗主体 -->
  <ellipse cx="24" cy="32" rx="18" ry="10" fill="url(#bowlGrad)"/>

  <!-- 碗口沿 -->
  <ellipse cx="24" cy="24" rx="18" ry="6" fill="#E85D3D"/>
  <ellipse cx="24" cy="24" rx="15" ry="4.5" fill="#C94A2E"/>

  <!-- 碗内食物 -->
  <ellipse cx="24" cy="24" rx="12" ry="3.5" fill="#F5A623"/>

  <!-- 部落装饰 - 顶部三角形图腾 -->
  <polygon points="24,2 20,10 28,10" fill="#8B5A2B"/>
  <circle cx="24" cy="6" r="1.5" fill="#F5A623"/>

  <!-- 部落装饰 - 碗身水平条纹 -->
  <g stroke="#8B5A2B" stroke-width="1.5" fill="none">
    <path d="M10 30 Q24 34 38 30"/>
    <path d="M12 34 Q24 37 36 34"/>
  </g>

  <!-- 部落装饰 - 碗身圆点 -->
  <circle cx="14" cy="31" r="1.2" fill="#F5A623"/>
  <circle cx="34" cy="31" r="1.2" fill="#F5A623"/>
  <circle cx="16" cy="35" r="1" fill="#F5A623"/>
  <circle cx="32" cy="35" r="1" fill="#F5A623"/>

  <!-- 筷子 -->
  <g fill="#8B5A2B">
    <rect x="38" y="16" width="2" height="22" rx="1" transform="rotate(25 39 27)"/>
    <rect x="42" y="14" width="2" height="22" rx="1" transform="rotate(35 43 25)"/>
  </g>
</svg>
